document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

u002Fspan><\u002Fdiv><h3 style=\"margin:0 0 8px;font-size:17px;font-weight:700\">Антикризис<\u002Fh3><p style=\"margin:0;font-size:14px;line-height:1.5;color:#6B6B74\">Решаем сложную задачу в условиях ограничений и неопределённости.<\u002Fp><\u002Fdiv>\n          <div data-reveal=\"\" style=\"position:relative\"><div style=\"display:flex;align-items:center;gap:10px;margin-bottom:16px\"><span style=\"width:34px;height:34px;border-radius:50%;background:linear-gradient(150deg,#FF6A2A,#FF4D12);color:#fff;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 14px rgba(255,90,31,.3)\">05<\u002Fspan><\u002Fdiv><h3 style=\"margin:0 0 8px;font-size:17px;font-weight:700\">Рефлексия<\u002Fh3><p style=\"margin:0;font-size:14px;line-height:1.5;color:#6B6B74\">Собираем выводы и создаём инструкцию по применению команды.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- MEMBERS -->\n  <section id=\"members\" style=\"scroll-margin-top:90px;max-width:1360px;margin:0 auto;padding:clamp(40px,8vw,88px) clamp(20px,4vw,40px) 0\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:32px\">\n      <div><span style=\"font-size:13px;font-weight:700;letter-spacing:2px;color:#FF5A1F;text-transform:uppercase\">Кто в команде<\u002Fspan><h2 style=\"margin:8px 0 0;font-size:clamp(24px,3.2vw,34px);font-weight:800;letter-spacing:-.5px\">Участники команды<\u002Fh2><\u002Fdiv>\n      <a onclick=\"{{ navMembers }}\" style=\"display:inline-flex;align-items:center;gap:8px;font-size:15px;font-weight:600;color:#15151A;cursor:pointer\" style-hover=\"color:#FF5A1F\">4 персональные инструкции <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fa>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(250px,100%),1fr));gap:20px\">\n      <sc-for list=\"{{ members }}\" as=\"m\" hint-placeholder-count=\"4\">\n        <div data-reveal=\"\" onclick=\"{{ m.open }}\" style=\"background:#fff;border:1px solid #ECE7E1;border-radius:26px;padding:22px;cursor:pointer;transition:transform .25s ease,box-shadow .25s ease\" style-hover=\"transform:translateY(-6px);box-shadow:0 20px 40px rgba(21,21,26,.1);border-color:#FFD9C6\">\n          <div style=\"position:relative;height:150px;border-radius:20px;background:radial-gradient(circle at 70% 30%,#FFE4D2,#FFF2EA);display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:18px\">\n            <span style=\"font-family:'Onest';font-size:64px;font-weight:800;color:#FF5A1F;opacity:.9\">{{ m.initial }}<\u002Fspan>\n            <span style=\"position:absolute;top:12px;left:12px;width:40px;height:40px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(21,21,26,.1)\">{{ m.iconEl }}<\u002Fspan>\n          <\u002Fdiv>\n          <h3 style=\"margin:0 0 10px;font-size:19px;font-weight:700\">{{ m.name }}<\u002Fh3>\n          <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px\">\n            <sc-for list=\"{{ m.badges }}\" as=\"b\" hint-placeholder-count=\"2\"><span style=\"font-size:12px;font-weight:600;color:#FF5A1F;background:#FFF2EA;padding:4px 10px;border-radius:999px\">{{ b }}<\u002Fspan><\u002Fsc-for>\n          <\u002Fdiv>\n          <p style=\"margin:0 0 16px;font-size:14px;line-height:1.5;color:#6B6B74;min-height:42px\">{{ m.desc }}<\u002Fp>\n          <span style=\"display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#FF5A1F\">Как со мной работать <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FF5A1F\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- HELP GAME BLOCK -->\n  <section style=\"max-width:1360px;margin:88px auto 0;padding:0 clamp(20px,4vw,40px)\">\n    <div style=\"background:#FFF7F1;border:1px solid #F6E4D6;border-radius:34px;padding:clamp(24px,5vw,44px);display:grid;grid-template-columns:repeat(auto-fit,minmax(min(300px,100%),1fr));gap:32px;align-items:center;position:relative;overflow:hidden\">\n      <div style=\"position:absolute;top:-60px;right:-30px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(255,106,42,.16),transparent 65%)\"><\u002Fdiv>\n      <div style=\"position:relative;z-index:2\">\n        <span style=\"display:inline-block;font-size:12px;font-weight:700;letter-spacing:2px;color:#FF5A1F;text-transform:uppercase;background:#fff;border:1px solid #FFD9C6;padding:7px 15px;border-radius:999px\">Интерактивная игра<\u002Fspan>\n        <h2 style=\"margin:18px 0 0;font-size:clamp(24px,3.2vw,34px);font-weight:800;letter-spacing:-.5px\">Не знаешь, к кому обратиться?<\u002Fh2>\n        <p style=\"margin:14px 0 0;font-size:17px;line-height:1.55;color:#6B6B74;max-width:520px\">Пройди мини-игру по дереву решений — ответь на несколько вопросов Да/Нет, и мы подскажем, кто из команды лучше всего поможет с твоей задачей прямо сейчас.<\u002Fp>\n        <button onclick=\"{{ goGame }}\" style=\"margin-top:26px;display:inline-flex;align-items:center;gap:10px;border:none;cursor:pointer;background:linear-gradient(150deg,#FF6A2A,#FF4D12);color:#fff;font-family:inherit;font-size:16px;font-weight:600;padding:15px 26px;border-radius:15px;box-shadow:0 10px 26px rgba(255,90,31,.3)\" style-hover=\"transform:translateY(-2px)\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"6\" cy=\"6\" r=\"3\"><\u002Fcircle><circle cx=\"6\" cy=\"18\" r=\"3\"><\u002Fcircle><path d=\"M20 4L9 15M20 4v6M20 4h-6M9 9v9\"><\u002Fpath><\u002Fsvg>Найти коллегу<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"position:relative;z-index:2;display:flex;align-items:center;justify-content:center;min-height:180px\">\n        <div style=\"display:flex;flex-direction:column;gap:12px\">\n          <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #F1E7DE;border-radius:16px;padding:14px 18px;box-shadow:0 8px 20px rgba(21,21,26,.05)\"><span style=\"flex:none;font-size:12px;font-weight:700;color:#1F8A5B;background:#EAF5EE;padding:5px 11px;border-radius:999px\">Да<\u002Fspan><span style=\"font-size:14px;font-weight:600;color:#4A4A52\">Задача про хаос и неопределённость?<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #F1E7DE;border-radius:16px;padding:14px 18px;box-shadow:0 8px 20px rgba(21,21,26,.05);margin-left:28px\"><span style=\"flex:none;font-size:12px;font-weight:700;color:#D9583C;background:#FBE7E2;padding:5px 11px;border-radius:999px\">Нет<\u002Fspan><span style=\"font-size:14px;font-weight:600;color:#4A4A52\">Есть риск сорвать сроки?<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;background:linear-gradient(150deg,#FF6A2A,#FF4D12);border-radius:16px;padding:14px 18px;box-shadow:0 10px 24px rgba(255,90,31,.28);margin-left:56px\"><span style=\"flex:none;width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px\">А<\u002Fspan><span style=\"font-size:14px;font-weight:700;color:#fff\">Тебе поможет Алиса Ч.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- HOW WE WORK -->\n  <section id=\"howwework\" style=\"scroll-margin-top:90px;max-width:1360px;margin:0 auto;padding:clamp(40px,8vw,88px) clamp(20px,4vw,40px) 0\">\n    <span style=\"font-size:13px;font-weight:700;letter-spacing:2px;color:#FF5A1F;text-transform:uppercase\">Принципы<\u002Fspan>\n    <h2 style=\"margin:8px 0 32px;font-size:clamp(24px,3.2vw,34px);font-weight:800;letter-spacing:-.5px\">Как мы работаем<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(200px,100%),1fr));gap:18px\">\n      <div data-reveal=\"\" style=\"background:#fff;border:1px solid #ECE7E1;border-radius:24px;padding:28px\" style-hover=\"border-color:#FFD9C6;transform:translateY(-4px)\"><span style=\"width:46px;height:46px;border-radius:13px;background:#FFF2EA;display:flex;align-items:center;justify-content:center;margin-bottom:16px\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FF5A1F\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"5\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"1.5\" fill=\"#FF5A1F\"><\u002Fcircle><\u002Fsvg><\u002Fspan><h3 style=\"margin:0 0 8px;font-size:17px;font-weight:700\">Цель<\u002Fh3><p style=\"margin:0;font-size:14px;line-height:1.5;color:#6B6B74\">Всегда начинаем с понимания результата.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#fff;border:1px solid #ECE7E1;border-radius:24px;padding:28px\" style-hover=\"border-color:#FFD9C6;transform:translateY(-4px)\"><span style=\"width:46px;height:46px;border-radius:13px;background:#FFF2EA;display:flex;align-items:center;justify-content:center;margin-bottom:16px\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FF5A1F\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75\"><\u002Fpath><\u002Fsvg><\u002Fspan><h3 style=\"margin:0 0 8px;font-size:17px;font-weight:700\">Роли<\u002Fh3><p style=\"margin:0;font-size:14px;line-height:1.5;color:#6B6B74\">Чёткое распределение зон ответственности.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#fff;border:1px solid #ECE7E1;border-radius:24px;padding:28px\" style-hover=\"border-color:#FFD9C6;transform:translateY(-4px)\"><span style=\"width:46px;height:46px;border-radius:13px;background:#FFF2EA;display:flex;align-items:center;justify-content:center;margin-bottom:16px\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FF5A1F\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"3\" width=\"7\" height=\"7\" rx=\"1.5\"><\u002Frect><rect x=\"14\" y=\"3\" width=\"7\" height=\"7\" rx=\"1.5\"><\u002Frect><rect x=\"14\" y=\"14\" width=\"7\" height=\"7\" rx=\"1.5\"><\u002Frect><rect x=\"3\" y=\"14\" width=\"7\" height=\"7\" rx=\"1.5\"><\u002Frect><\u002Fsvg><\u002Fspan><h3 style=\"margin:0 0 8px;font-size:17px;font-weight:700\">Структура<\u002Fh3><p style=\"margin:0;font-size:14px;line-height:1.5;color:#6B6B74\">Разбиваем задачу на понятные блоки.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#fff;border:1px solid #ECE7E1;border-radius:24px;padding:28px\" style-hover=\"border-color:#FFD9C6;transform:translateY(-4px)\"><span style=\"width:46px;height:46px;border-radius:13px;background:#FFF2EA;display:flex;align-items:center;justify-content:center;margin-bottom:16px\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FF5A1F\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 12h-4l-3 9L9 3l-3 9H2\"><\u002Fpath><\u002Fsvg><\u002Fspan><h3 style=\"margin:0 0 8px;font-size:17px;font-weight:700\">Ритм<\u002Fh3><p style=\"margin:0;font-size:14px;line-height:1.5;color:#6B6B74\">Чёткость, дедлайны и прозрачность.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#fff;border:1px solid #ECE7E1;border-radius:24px;padding:28px\" style-hover=\"border-color:#FFD9C6;transform:translateY(-4px)\"><span style=\"width:46px;height:46px;border-radius:13px;background:#FFF2EA;display:flex;align-items:center;justify-content:center;margin-bottom:16px\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FF5A1F\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z\"><\u002Fpath><path d=\"M3.27 6.96L12 12.01l8.73-5.05M12 22.08V12\"><\u002Fpath><\u002Fsvg><\u002Fspan><h3 style=\"margin:0 0 8px;font-size:17px;font-weight:700\">Упаковка<\u002Fh3><p style=\"margin:0;font-size:14px;line-height:1.5;color:#6B6B74\">Собираем результат в сильный артефакт.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#fff;border:1px solid #ECE7E1;border-radius:24px;padding:28px\" style-hover=\"border-color:#FFD9C6;transform:translateY(-4px)\"><span style=\"width:46px;height:46px;border-radius:13px;background:#FFF2EA;display:flex;align-items:center;justify-content:center;margin-bottom:16px\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FF5A1F\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M23 4v6h-6M1 20v-6h6\"><\u002Fpath><path d=\"M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15\"><\u002Fpath><\u002Fsvg><\u002Fspan><h3 style=\"margin:0 0 8px;font-size:17px;font-weight:700\">Рефлексия<\u002Fh3><p style=\"margin:0;font-size:14px;line-height:1.5;color:#6B6B74\">Анализируем опыт и становимся лучше.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- MODES (dark full width) -->\n  <section id=\"modes\" style=\"scroll-margin-top:90px;margin-top:88px\">\n    <div style=\"max-width:1360px;margin:0 auto;padding:0 clamp(20px,4vw,40px)\">\n      <div style=\"background:linear-gradient(150deg,#1C1C22,#141418);border-radius:34px;padding:clamp(24px,5vw,48px);position:relative;overflow:hidden\">\n        <div style=\"position:absolute;top:-60px;right:-40px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(255,106,42,.28),transparent 65%)\"><\u002Fdiv>\n        <div style=\"position:relative;z-index:2;max-width:560px\">\n          <h2 style=\"margin:0;font-size:clamp(24px,3.2vw,34px);font-weight:800;color:#fff;letter-spacing:-.5px\">Режимы работы команды<\u002Fh2>\n          <p style=\"margin:12px 0 0;font-size:16px;line-height:1.55;color:#B9B9C2\">Переключайте режимы, чтобы понять, что помогает нам быть эффективными в разных ситуациях.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"position:relative;z-index:2;margin-top:34px;display:grid;grid-template-columns:repeat(auto-fit,minmax(min(280px,100%),1fr));gap:32px;align-items:start\">\n          <!-- tabs -->\n          <div style=\"display:flex;flex-direction:column;gap:8px\">\n            <sc-for list=\"{{ modes }}\" as=\"md\" hint-placeholder-count=\"5\">\n              <button onclick=\"{{ md.click }}\" style=\"{{ md.tabStyle }}\">\n                <span style=\"{{ md.dotStyle }}\">{{ md.icon }}<\u002Fspan>{{ md.name }}\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <!-- detail -->\n          <div style=\"background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:32px;min-height:220px\">\n            <h3 style=\"margin:0;font-size:24px;font-weight:700;color:#fff\">{{ mode.name }}<\u002Fh3>\n            <p style=\"margin:12px 0 0;font-size:16px;line-height:1.55;color:#C8C8D0\">{{ mode.desc }}<\u002Fp>\n            <div style=\"margin-top:22px;font-size:13px;font-weight:600;letter-spacing:1px;color:#FF8A5C;text-transform:uppercase\">Что помогает<\u002Fdiv>\n            <div style=\"margin-top:12px;display:flex;flex-wrap:wrap;gap:8px\">\n              <sc-for list=\"{{ mode.helps }}\" as=\"h\" hint-placeholder-count=\"4\"><span style=\"font-size:14px;color:#EDEDF2;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);padding:8px 14px;border-radius:12px\">{{ h }}<\u002Fspan><\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- RISKS (light full width, interactive) -->\n  <section id=\"risks\" style=\"scroll-margin-top:90px;margin-top:32px\">\n    <div style=\"max-width:1360px;margin:0 auto;padding:0 clamp(20px,4vw,40px)\">\n      <div style=\"background:#fff;border:1px solid #ECE7E1;border-radius:34px;padding:clamp(24px,5vw,48px)\">\n        <div style=\"display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:34px\">\n          <div><span style=\"font-size:13px;font-weight:700;letter-spacing:2px;color:#FF5A1F;text-transform:uppercase\">Устойчивость<\u002Fspan><h2 style=\"margin:8px 0 0;font-size:clamp(24px,3.2vw,34px);font-weight:800;letter-spacing:-.5px\">Риски и восстановление<\u002Fh2><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(300px,100%),1fr));gap:40px\">\n          <!-- risk zones -->\n          <div>\n            <h3 style=\"margin:0 0 18px;font-size:15px;font-weight:700;color:#6B6B74;letter-spacing:.5px\">Зоны риска<\u002Fh3>\n            <div style=\"display:flex;flex-direction:column;gap:10px\">\n              <sc-for list=\"{{ riskZones }}\" as=\"z\" hint-placeholder-count=\"5\">\n                <div style=\"display:flex;align-items:center;gap:14px;background:#FFF7F1;border:1px solid #F6E4D6;border-radius:16px;padding:16px 18px\"><svg style=\"flex:none\" width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FF7A3D\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z\"><\u002Fpath><path d=\"M12 9v4M12 17h.01\"><\u002Fpath><\u002Fsvg><span style=\"font-size:15px;line-height:1.4\">{{ z }}<\u002Fspan><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- recovery protocol (accordion) -->\n          <div>\n            <h3 style=\"margin:0 0 18px;font-size:15px;font-weight:700;color:#6B6B74;letter-spacing:.5px\">Протокол восстановления<\u002Fh3>\n            <div style=\"display:flex;flex-direction:column;gap:10px\">\n              <sc-for list=\"{{ recovery }}\" as=\"r\" hint-placeholder-count=\"5\">\n                <div onclick=\"{{ r.toggle }}\" style=\"{{ r.cardStyle }}\">\n                  <div style=\"display:flex;align-items:center;gap:14px\">\n                    <span style=\"flex:none;width:30px;height:30px;border-radius:50%;background:linear-gradient(150deg,#FF6A2A,#FF4D12);color:#fff;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center\">{{ r.num }}<\u002Fspan>\n                    <span style=\"flex:1;font-size:15px;font-weight:600\">{{ r.title }}<\u002Fspan>\n                    <span style=\"{{ r.chevStyle }}\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FF5A1F\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ r.open }}\"><p style=\"margin:12px 0 0 44px;font-size:14px;line-height:1.5;color:#6B6B74\">{{ r.detail }}<\u002Fp><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CTA -->\n  <section style=\"max-width:1360px;margin:88px auto 0;padding:0 clamp(20px,4vw,40px)\">\n    <div style=\"background:linear-gradient(135deg,#FF6A2A,#FF4A10);border-radius:34px;padding:clamp(28px,6vw,52px);display:grid;grid-template-columns:repeat(auto-fit,minmax(min(280px,100%),1fr));gap:32px;align-items:center;position:relative;overflow:hidden\">\n      <span aria-hidden=\"true\" style=\"position:absolute;top:0;left:0;width:34%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.30),transparent);animation:tosShimmer 7s ease-in-out infinite;pointer-events:none;z-index:1\"><\u002Fspan><div style=\"position:absolute;bottom:-80px;left:-30px;width:260px;height:260px;border-radius:50%;background:rgba(255,255,255,.12)\"><\u002Fdiv>\n      <div style=\"position:relative;z-index:2\">\n        <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:14px\"><span style=\"width:52px;height:52px;border-radius:15px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 19V6a2 2 0 0 1 2-2h9v16H6a2 2 0 0 1-2-2z\"><\u002Fpath><path d=\"M15 4h3a2 2 0 0 1 2 2v13\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fdiv>\n        <h2 style=\"margin:0;font-size:clamp(26px,3.4vw,36px);font-weight:800;color:#fff;letter-spacing:-.5px\">Инструкция для нового участника<\u002Fh2>\n        <p style=\"margin:14px 0 0;font-size:17px;line-height:1.55;color:rgba(255,255,255,.9);max-width:560px\">Короткий гайд о команде, принципах работы, ролях и правилах. Всё, что нужно знать для старта.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"position:relative;z-index:2;display:flex;flex-wrap:wrap;gap:12px;justify-content:flex-end\">\n        <button onclick=\"{{ goNewbie }}\" style=\"display:inline-flex;align-items:center;gap:10px;border:none;cursor:pointer;background:#fff;color:#FF5A1F;font-family:inherit;font-size:16px;font-weight:700;padding:17px 30px;border-radius:16px;box-shadow:0 12px 30px rgba(0,0,0,.16)\" style-hover=\"transform:translateY(-2px)\">Перейти к инструкции <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FF5A1F\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n        <button onclick=\"{{ goGame }}\" style=\"display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(255,255,255,.55);cursor:pointer;background:transparent;color:#fff;font-family:inherit;font-size:16px;font-weight:600;padding:16px 26px;border-radius:16px\" style-hover=\"background:rgba(255,255,255,.14)\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"6\" cy=\"6\" r=\"3\"><\u002Fcircle><circle cx=\"6\" cy=\"18\" r=\"3\"><\u002Fcircle><path d=\"M20 4L9 15M20 4v6M20 4h-6M9 9v9\"><\u002Fpath><\u002Fsvg>Найти коллегу<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fmain>\n<\u002Fsc-if>\n\n<!-- ============================================================= -->\n<!-- ============ PERSONAL PAGE (data-driven) ============ -->\n<!-- ============================================================= -->\n<sc-if value=\"{{ isPersonal }}\">\n<main style=\"max-width:1360px;margin:0 auto;padding:0 clamp(20px,4vw,40px)\">\n\n  <!-- 01 HERO / OVERVIEW -->\n  <section id=\"obzor\" style=\"scroll-margin-top:150px;padding-top:44px\">\n    <div style=\"background:linear-gradient(155deg,#FFF6F0,#FBFAF7 60%);border:1px solid #F1E7DE;border-radius:34px;padding:clamp(24px,5vw,48px);display:grid;grid-template-columns:repeat(auto-fit,minmax(min(300px,100%),1fr));gap:40px;align-items:center\">\n      <div>\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:18px\"><span style=\"font-size:13px;font-weight:700;letter-spacing:2px;color:#FF5A1F;text-transform:uppercase\">Инструкция по применению<\u002Fspan><\u002Fdiv>\n        <h1 style=\"margin:0;font-size:clamp(38px,5.4vw,60px);line-height:1.02;font-weight:800;letter-spacing:-1.5px\">{{ p.name }}<\u002Fh1>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:16px\">\n          <span style=\"font-size:13px;font-weight:700;color:#fff;background:linear-gradient(150deg,#FF6A2A,#FF4D12);padding:6px 14px;border-radius:999px\">{{ p.role }}<\u002Fspan>\n          <span style=\"font-size:13px;font-weight:500;color:#6B6B74;background:#fff;border:1px solid #ECE7E1;padding:6px 14px;border-radius:999px\">{{ p.workType }}<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:22px 0 0;font-family:'Lora',serif;font-style:italic;font-size:clamp(19px,2.3vw,24px);line-height:1.4;color:#15151A;max-width:520px\">«{{ p.quote }}»<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:7px;margin-top:22px\">\n          <sc-for list=\"{{ p.badges }}\" as=\"b\" hint-placeholder-count=\"5\"><span style=\"font-size:13px;font-weight:600;color:#FF5A1F;background:#FFF2EA;padding:6px 13px;border-radius:999px\">{{ b }}<\u002Fspan><\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;display:flex;align-items:center;justify-content:center;min-height:280px\">\n        <div style=\"position:absolute;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(255,106,42,.2),transparent 66%);animation:tosPulse 6s ease-in-out infinite\"><\u002Fdiv>\n        <span aria-hidden=\"true\" style=\"position:absolute;top:14px;right:22px;width:9px;height:9px;border-radius:50%;background:#FF6A2A;animation:tosTwinkle 3s ease-in-out infinite\"><\u002Fspan><span aria-hidden=\"true\" style=\"position:absolute;bottom:36px;left:16px;width:6px;height:6px;border-radius:50%;background:#FFA877;animation:tosTwinkle 2.4s ease-in-out .5s infinite\"><\u002Fspan>\n        <div style=\"position:relative;width:210px;max-width:80vw;height:250px;border-radius:40% 40% 44% 44%/46% 46% 40% 40%;background:radial-gradient(circle at 65% 30%,#FFDBC7,#FF8F63);display:flex;align-items:center;justify-content:center;box-shadow:0 26px 50px rgba(255,90,31,.28)\">\n          <span style=\"font-size:96px;font-weight:800;color:#fff\">{{ p.initial }}<\u002Fspan>\n        <\u002Fdiv>\n        <span style=\"position:absolute;top:20px;right:26px;width:54px;height:54px;border-radius:16px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 26px rgba(21,21,26,.1);animation:tosFloat 5s ease-in-out infinite\">{{ p.iconEl }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin:34px 0 0;font-size:clamp(16px,1.5vw,18px);line-height:1.7;color:#3D3D45;max-width:820px\">{{ p.overview }}<\u002Fp>\n  <\u002Fsection>\n\n  <!-- 02 QUICK SETTINGS -->\n  <section id=\"settings\" style=\"scroll-margin-top:150px;padding-top:80px\">\n    <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:28px\"><span style=\"font-size:clamp(30px,3.6vw,40px);font-weight:800;color:#FFCDB4\">02<\u002Fspan><h2 style=\"margin:0;font-size:clamp(24px,3vw,32px);font-weight:800;letter-spacing:-.5px\">Быстрые настройки<\u002Fh2><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(230px,100%),1fr));gap:18px\">\n      <sc-for list=\"{{ p.quickSettings }}\" as=\"q\" hint-placeholder-count=\"5\">\n        <div data-reveal=\"\" style=\"background:#fff;border:1px solid #ECE7E1;border-radius:22px;padding:26px\" style-hover=\"border-color:#FFD9C6;transform:translateY(-4px)\">\n          <span style=\"display:flex;width:40px;height:40px;border-radius:11px;background:#FFF2EA;color:#FF5A1F;align-items:center;justify-content:center;font-weight:700;font-size:15px;margin-bottom:16px\">{{ q.n }}<\u002Fspan>\n          <h3 style=\"margin:0 0 8px;font-size:15px;font-weight:700\">{{ q.title }}<\u002Fh3>\n          <p style=\"margin:0;font-size:14px;line-height:1.5;color:#6B6B74\">{{ q.text }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 03 WHEN TO PLUG IN -->\n  <section id=\"when\" style=\"scroll-margin-top:150px;padding-top:80px\">\n    <div style=\"display:flex;align-it span><div style=\"position:absolute;top:-60px;right:80px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.12)\"><\u002Fdiv>\n      <div style=\"position:relative;z-index:2\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px\"><span style=\"width:48px;height:48px;border-radius:14px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"#fff\"><path d=\"M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fdiv>\n        <h2 style=\"margin:0;font-size:clamp(26px,3.4vw,36px);font-weight:800;color:#fff;letter-spacing:-.5px\">Спасибо, что вы с нами<\u002Fh2>\n        <p style=\"margin:14px 0 0;font-size:17px;line-height:1.55;color:rgba(255,255,255,.9);max-width:520px\">Мы команда, которая движется вперёд вместе. Вопросы? Пишите в чат — разберёмся.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"position:relative;z-index:2;display:flex;justify-content:flex-end\">\n        <button onclick=\"{{ goHome }}\" style=\"display:inline-flex;align-items:center;gap:10px;border:none;cursor:pointer;background:#fff;color:#FF5A1F;font-family:inherit;font-size:16px;font-weight:700;padding:17px 30px;border-radius:16px;box-shadow:0 12px 30px rgba(0,0,0,.16)\" style-hover=\"transform:translateY(-2px)\">Вернуться к команде <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FF5A1F\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fmain>\n<\u002Fsc-if>\n\n<!-- ============================================================= -->\n<!-- ============ GAME PAGE (help-me-choose) ============ -->\n<!-- ============================================================= -->\n<sc-if value=\"{{ isGame }}\">\n<main style=\"max-width:1360px;margin:0 auto;padding:0 clamp(20px,4vw,40px)\">\n\n  <!-- HERO -->\n  <section style=\"padding-top:44px\">\n    <div style=\"background:linear-gradient(155deg,#FFF6F0,#FBFAF7 62%);border:1px solid #F1E7DE;border-radius:36px;padding:clamp(24px,6vw,56px);display:grid;grid-template-columns:repeat(auto-fit,minmax(min(340px,100%),1fr));gap:40px;align-items:center;overflow:hidden;position:relative\">\n      <div style=\"position:relative;z-index:2\">\n        <span style=\"display:inline-block;font-size:12px;font-weight:700;letter-spacing:2px;color:#FF5A1F;text-transform:uppercase;background:#FFF2EA;border:1px solid #FFD9C6;padding:7px 15px;border-radius:999px\">Интерактивная игра<\u002Fspan>\n        <h1 style=\"margin:20px 0 0;font-size:clamp(36px,5.2vw,58px);line-height:1.03;font-weight:800;letter-spacing:-1.5px\">Нужна срочная помощь?<\u002Fh1>\n        <p style=\"margin:8px 0 0;font-size:clamp(28px,4vw,46px);line-height:1.05;font-weight:800;color:#FF5A1F;letter-spacing:-1px\">Найди подходящего коллегу<\u002Fp>\n        <p style=\"margin:22px 0 0;font-size:clamp(16px,1.5vw,18px);line-height:1.6;color:#6B6B74;max-width:480px\">Ответь на несколько вопросов о своей ситуации, и мы подскажем, кто из команды лучше всего поможет прямо сейчас.<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:12px;margin-top:30px\">\n          <button onclick=\"{{ game.start }}\" style=\"display:inline-flex;align-items:center;gap:10px;border:none;cursor:pointer;background:linear-gradient(150deg,#FF6A2A,#FF4D12);color:#fff;font-family:inherit;font-size:16px;font-weight:600;padding:15px 26px;border-radius:15px;box-shadow:0 10px 26px rgba(255,90,31,.3)\" style-hover=\"transform:translateY(-2px)\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"#fff\"><path d=\"M5 3l14 9-14 9V3z\"><\u002Fpath><\u002Fsvg>Начать игру<\u002Fbutton>\n          <button onclick=\"{{ game.start }}\" style=\"display:inline-flex;align-items:center;gap:9px;border:1px solid #ECE7E1;cursor:pointer;background:#fff;color:#15151A;font-family:inherit;font-size:16px;font-weight:600;padding:15px 24px;border-radius:15px\" style-hover=\"border-color:#FF5A1F;color:#FF5A1F\">Как это работает? <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M12 17h.01\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;height:380px;display:flex;align-items:center;justify-content:center\">\n        <div style=\"position:absolute;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(255,106,42,.22),transparent 66%);animation:tosPulse 6s ease-in-out infinite\"><\u002Fdiv>\n        <span aria-hidden=\"true\" style=\"position:absolute;top:24px;right:34px;width:10px;height:10px;border-radius:50%;background:#FF6A2A;animation:tosTwinkle 3.1s ease-in-out infinite\"><\u002Fspan><span aria-hidden=\"true\" style=\"position:absolute;bottom:56px;left:22px;width:6px;height:6px;border-radius:50%;background:#FFA877;animation:tosTwinkle 2.5s ease-in-out .6s infinite\"><\u002Fspan><span aria-hidden=\"true\" style=\"position:absolute;top:56%;left:14%;width:5px;height:5px;border-radius:50%;background:#FF4D12;animation:tosTwinkle 3.7s ease-in-out 1s infinite\"><\u002Fspan>\n        <span style=\"position:absolute;top:10px;left:40px;width:56px;height:56px;border-radius:17px;background:#fff;border:1px solid #F1E7DE;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 26px rgba(21,21,26,.08);animation:tosFloat 5s ease-in-out infinite\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FF5A1F\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <span style=\"position:absolute;bottom:40px;right:36px;width:56px;height:56px;border-radius:17px;background:#fff;border:1px solid #F1E7DE;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 26px rgba(21,21,26,.08);animation:tosFloat2 6s ease-in-out infinite\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FF5A1F\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <div style=\"position:relative;z-index:2;width:270px;max-width:100%;background:#fff;border:1px solid #EFE6DD;border-radius:30px;padding:20px;box-shadow:0 30px 60px rgba(21,21,26,.14)\">\n          <div style=\"background:#16161B;border-radius:20px;padding:30px 22px;text-align:center\"><div style=\"font-size:26px;font-weight:800;color:#FF6A2A;letter-spacing:1px\">TEAM OS<\u002Fdiv><div style=\"font-size:13px;color:#8A8A93;margin-top:4px;letter-spacing:3px\">v5.0<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;justify-content:center;gap:12px;margin-top:18px\"><span style=\"width:30px;height:30px;border-radius:50%;background:linear-gradient(150deg,#FF6A2A,#FF4D12)\"><\u002Fspan><span style=\"width:30px;height:30px;border-radius:50%;background:#EDE7E0\"><\u002Fspan><span style=\"width:30px;height:30px;border-radius:50%;background:#EDE7E0\"><\u002Fspan><span style=\"width:30px;height:30px;border-radius:50%;background:linear-gradient(150deg,#FF6A2A,#FF4D12)\"><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- HOW IT WORKS -->\n  <section style=\"padding-top:80px\">\n    <h2 style=\"margin:0 0 32px;font-size:clamp(24px,3.2vw,34px);font-weight:800;letter-spacing:-.5px\">Как проходит игра<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(220px,100%),1fr));gap:18px\">\n      <div data-reveal=\"\" style=\"background:#fff;border:1px solid #ECE7E1;border-radius:24px;padding:28px\"><span style=\"width:46px;height:46px;border-radius:13px;background:#FFF2EA;display:flex;align-items:center;justify-content:center;margin-bottom:16px\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FF5A1F\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z\"><\u002Fpath><path d=\"M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z\"><\u002Fpath><path d=\"M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0\"><\u002Fpath><\u002Fsvg><\u002Fspan><h3 style=\"margin:0 0 8px;font-size:16px;font-weight:700\">Отвечай на вопросы<\u002Fh3><p style=\"margin:0;font-size:14px;line-height:1.5;color:#6B6B74\">Выбирай «Да» или «Нет» на каждом шаге.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#fff;border:1px solid #ECE7E1;border-radius:24px;padding:28px\"><span style=\"width:46px;height:46px;border-radius:13px;background:#FFF2EA;display:flex;align-items:center;justify-content:center;margin-bottom:16px\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FF5A1F\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"6\" cy=\"6\" r=\"3\"><\u002Fcircle><circle cx=\"6\" cy=\"18\" r=\"3\"><\u002Fcircle><path d=\"M20 4L9 15M20 4v6M20 4h-6M9 9v9\"><\u002Fpath><\u002Fsvg><\u002Fspan><h3 style=\"margin:0 0 8px;font-size:16px;font-weight:700\">Следуй по веткам<\u002Fh3><p style=\"margin:0;font-size:14px;line-height:1.5;color:#6B6B74\">Игра ведёт тебя по дереву решений.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#fff;border:1px solid #ECE7E1;border-radius:24px;padding:28px\"><span style=\"width:46px;height:46px;border-radius:13px;background:#FFF2EA;display:flex;align-items:center;justify-content:center;margin-bottom:16px\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FF5A1F\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"5\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"1.5\" fill=\"#FF5A1F\"><\u002Fcircle><\u002Fsvg><\u002Fspan><h3 style=\"margin:0 0 8px;font-size:16px;font-weight:700\">Получай рекомендацию<\u002Fh3><p style=\"margin:0;font-size:14px;line-height:1.5;color:#6B6B74\">Узнаешь, кто поможет лучше всего.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#fff;border:1px solid #ECE7E1;border-radius:24px;padding:28px\"><span style=\"width:46px;height:46px;border-radius:13px;background:#FFF2EA;display:flex;align-items:center;justify-content:center;margin-bottom:16px\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FF5A1F\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z\"><\u002Fpath><\u002Fsvg><\u002Fspan><h3 style=\"margin:0 0 8px;font-size:16px;font-weight:700\">Обращайся к коллеге<\u002Fh3><p style=\"margin:0;font-size:14px;line-height:1.5;color:#6B6B74\">Переходи в его инструкцию и узнай больше.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- INTERACTIVE PLAY -->\n  <section id=\"game-play\" style=\"scroll-margin-top:90px;padding-top:80px\">\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(340px,100%),1fr));gap:20px;align-items:start\">\n\n      <!-- LEFT: question / result -->\n      <div style=\"background:#fff;border:1px solid #ECE7E1;border-radius:28px;padding:36px;min-height:360px\">\n        <!-- QUESTION -->\n        <sc-if value=\"{{ game.playing }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:10px\"><span style=\"font-size:14px;font-weight:600;color:#6B6B74\">Шаг {{ game.step }}<\u002Fspan><span style=\"font-size:13px;color:#9A9AA2\">Да / Нет<\u002Fspan><\u002Fdiv>\n          <div style=\"height:8px;border-radius:999px;background:#F1ECE6;overflow:hidden;margin-bottom:28px\"><div style=\"{{ game.progressStyle }}\"><\u002Fdiv><\u002Fdiv>\n          <h2 style=\"margin:0;font-size:clamp(22px,2.6vw,28px);font-weight:800;line-height:1.2;letter-spacing:-.5px\">{{ game.q }}<\u002Fh2>\n          <p style=\"margin:14px 0 26px;font-size:16px;line-height:1.55;color:#6B6B74\">{{ game.hint }}<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n            <button onclick=\"{{ game.answerYes }}\" style=\"display:flex;align-items:center;justify-content:center;gap:10px;border:1px solid #D6EBDC;cursor:pointer;background:#F1F8F3;color:#1F8A5B;font-family:inherit;font-size:17px;font-weight:700;padding:18px;border-radius:16px;transition:all .2s\" style-hover=\"background:#1F8A5B;color:#fff;border-color:#1F8A5B\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>Да<\u002Fbutton>\n            <button onclick=\"{{ game.answerNo }}\" style=\"display:flex;align-items:center;justify-content:center;gap:10px;border:1px solid #F3D9D3;cursor:pointer;background:#FDF3F1;color:#D9583C;font-family:inherit;font-size:17px;font-weight:700;padding:18px;border-radius:16px;transition:all .2s\" style-hover=\"background:#D9583C;color:#fff;border-color:#D9583C\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\"><path d=\"M18 6L6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg>Нет<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;background:#FBFAF7;border:1px solid #F1ECE6;border-radius:14px;padding:14px 16px;margin-top:16px\"><svg style=\"flex:none\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FF5A1F\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 8v5M12 16h.01\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><div><div style=\"font-size:13px;font-weight:700\">Подсказка<\u002Fdiv><div style=\"font-size:13px;color:#6B6B74\">Честный ответ поможет точнее подобрать коллегу.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <sc-if value=\"{{ game.canBack }}\"><button onclick=\"{{ game.back }}\" style=\"margin-top:16px;display:inline-flex;align-items:center;gap:8px;border:none;cursor:pointer;background:transparent;color:#6B6B74;font-family:inherit;font-size:14px;font-weight:600;padding:6px 0\" style-hover=\"color:#FF5A1F\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M19 12H5M11 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg>Назад<\u002Fbutton><\u002Fsc-if>\n        <\u002Fsc-if>\n\n        <!-- RESULT -->\n        <sc-if value=\"{{ game.hasResult }}\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:22px\"><span style=\"font-size:12px;font-weight:700;letter-spacing:2px;color:#FF5A1F;text-transform:uppercase\">Результат<\u002Fspan><span style=\"flex:1;height:1px;background:#F1ECE6\"><\u002Fspan><\u002Fdiv>\n          <sc-if value=\"{{ game.isChat }}\">\n            <div style=\"text-align:center;padding:20px 0\"><span style=\"display:inline-flex;width:72px;height:72px;border-radius:22px;background:#FFF2EA;align-items:center;justify-content:center;margin-bottom:18px\"><svg width=\"34\" height=\"34\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FF5A1F\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15a2 2 0 0 1-2 2H7 eight:36px;border-radius:11px;background:linear-gradient(150deg,#FF6A2A,#FF4D12);display:flex;align-items:center;justify-content:center\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"#fff\"><path d=\"M12 2l2.9 6.1 6.6.8-4.9 4.5 1.3 6.6L12 17.8 6.1 20l1.3-6.6L2.5 8.9l6.6-.8z\"><\u002Fpath><\u002Fsvg><\u002Fspan><span style=\"display:flex;flex-direction:column;line-height:1\"><b style=\"font-size:15px;font-weight:800;letter-spacing:.5px\">TEAM OS<\u002Fb><span style=\"font-size:10px;color:#6B6B74;letter-spacing:2px;text-transform:uppercase\">manual<\u002Fspan><\u002Fspan><\u002Fa>\n      <p style=\"margin:0;font-size:14px;line-height:1.55;color:#6B6B74\">Команда 154 — вместе делаем сложное простым.<\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-size:13px;font-weight:700;letter-spacing:1px;color:#9A9AA2;text-transform:uppercase;margin-bottom:14px\">Навигация<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:10px\">\n        <a onclick=\"{{ navAbout }}\" style=\"font-size:14px;color:#4A4A52;cursor:pointer;white-space:nowrap\" style-hover=\"color:#FF5A1F\">О команде<\u002Fa>\n        <a onclick=\"{{ navMembers }}\" style=\"font-size:14px;color:#4A4A52;cursor:pointer;white-space:nowrap\" style-hover=\"color:#FF5A1F\">Участники<\u002Fa>\n        <a onclick=\"{{ navHow }}\" style=\"font-size:14px;color:#4A4A52;cursor:pointer;white-space:nowrap\" style-hover=\"color:#FF5A1F\">Как мы работаем<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-size:13px;font-weight:700;letter-spacing:1px;color:#9A9AA2;text-transform:uppercase;margin-bottom:14px\">Разделы<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:10px\">\n        <a onclick=\"{{ navModes }}\" style=\"font-size:14px;color:#4A4A52;cursor:pointer;white-space:nowrap\" style-hover=\"color:#FF5A1F\">Режимы<\u002Fa>\n        <a onclick=\"{{ navRisks }}\" style=\"font-size:14px;color:#4A4A52;cursor:pointer;white-space:nowrap\" style-hover=\"color:#FF5A1F\">Риски и поддержка<\u002Fa>\n        <a onclick=\"{{ goNewbie }}\" style=\"font-size:14px;color:#4A4A52;cursor:pointer;white-space:nowrap\" style-hover=\"color:#FF5A1F\">Инструкция новичку<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-size:13px;font-weight:700;letter-spacing:1px;color:#9A9AA2;text-transform:uppercase;margin-bottom:14px\">Контакты<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:10px\">\n        <span style=\"display:flex;align-items:center;gap:9px;font-size:14px;color:#4A4A52;white-space:nowrap\"><svg style=\"flex:none\" width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FF5A1F\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"2\" y=\"4\" width=\"20\" height=\"16\" rx=\"2\"><\u002Frect><path d=\"M22 7l-10 5L2 7\"><\u002Fpath><\u002Fsvg>team154@basecamp.ru<\u002Fspan>\n        <span style=\"display:flex;align-items:center;gap:9px;font-size:14px;color:#4A4A52;white-space:nowrap\"><svg style=\"flex:none\" width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FF5A1F\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"><\u002Fpath><\u002Fsvg>Team OS Basecamp<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"border-top:1px solid #F1ECE6\"><div style=\"max-width:1360px;margin:0 auto;padding:20px clamp(20px,4vw,40px);font-size:13px;color:#9A9AA2\">Команда 154 · Sprint 5 · Team OS manual<\u002Fdiv><\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900},&quot;scrollReveal&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Поведение&quot;}}\">\nclass Component extends DCLogic {\n  state = { page: 'home', pid: 'anna', mode: 0, riskOpen: -1, resetStep: -1, menuOpen: false, activeAnchor: '', gameStep: 'q1', gamePath: [], gameResult: null };\n\n  componentDidMount() {\n    this._onScroll = () => {\n      if (this._raf) return;\n      this._raf = requestAnimationFrame(() => {\n        this._raf = null;\n        this.updateActive();\n      });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this.setupReveal();\n  }\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this._onScroll);\n    if (this._resetTimer) clearInterval(this._resetTimer);\n  }\n  componentDidUpdate(prevProps, prevState) {\n    if (!prevState) return;\n    if (prevState.page !== this.state.page || prevState.pid !== this.state.pid) {\n      window.scrollTo(0, 0);\n      setTimeout(() => this.setupReveal(), 30);\n    }\n  }\n\n  setupReveal() {\n    if ((this.props.scrollReveal ?? true) === false) return;\n    if (this._io) this._io.disconnect();\n    const els = Array.from(document.querySelectorAll('[data-reveal]'));\n    els.forEach(el => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(18px)';\n      el.style.transition = 'opacity .6s cubic-bezier(.2,.7,.3,1), transform .6s cubic-bezier(.2,.7,.3,1)';\n    });\n    this._io = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (e.isIntersecting) {\n          e.target.style.opacity = '1';\n          e.target.style.transform = 'none';\n          this._io.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });\n    els.forEach(el => this._io.observe(el));\n  }\n\n  sections() {\n    if (this.state.page === 'personal') return ['obzor','settings','when','style','comm','blockers','support','super','warning','exp','others'];\n    if (this.state.page === 'newbie') return ['n-obzor','n-roles','n-work','n-comm','n-start','n-help','n-principles'];\n    return [];\n  }\n  updateActive() {\n    const ids = this.sections();\n    if (!ids.length) return;\n    let cur = ids[0];\n    for (const id of ids) {\n      const el = document.getElementById(id);\n      if (el && el.getBoundingClientRect().top <= 180) cur = id;\n    }\n    if (cur !== this.state.activeAnchor) this.setState({ activeAnchor: cur });\n  }\n\n  scrollToId(id) {\n    const el = document.getElementById(id);\n    if (!el) return;\n    const off = this.state.page === 'home' ? 88 : 138;\n    window.scrollTo({ top: window.pageYOffset + el.getBoundingClientRect().top - off, behavior: 'smooth' });\n  }\n\n  goHome = () => { window.scrollTo(0, 0); this.setState({ page: 'home', menuOpen: false }); };\n  goNewbie = () => { window.scrollTo(0, 0); this.setState({ page: 'newbie', menuOpen: false, activeAnchor: 'n-obzor' }); };\n  openPerson = (id) => { window.scrollTo(0, 0); this.setState({ page: 'personal', pid: id, menuOpen: false, resetStep: -1, activeAnchor: 'obzor' }); };\n  toggleMenu = () => { this.setState(s => ({ menuOpen: !s.menuOpen })); };\n\n  goGame = () => { window.scrollTo(0,0); this.setState({ page:'game', menuOpen:false, gameStep:'q1', gamePath:[], gameResult:null }); };\n  startGame = () => { this.scrollToId('game-play'); };\n  answerGame = (ans) => {\n    const gt = this.gameTree();\n    const node = gt[this.state.gameStep];\n    const next = ans ? node.yes : node.no;\n    if (gt[next]) this.setState(s => ({ gamePath: [...s.gamePath, s.gameStep], gameStep: next }));\n    else this.setState({ gameResult: next });\n  };\n  backGame = () => {\n    if (this.state.gameResult) { this.setState({ gameResult: null }); return; }\n    this.setState(s => { const p = [...s.gamePath]; const prev = p.pop(); return prev ? { gamePath: p, gameStep: prev } : {}; });\n  };\n  restartGame = () => { window.scrollTo({top: (document.getElementById('game-play')?.offsetTop||0)-120, behavior:'smooth'}); this.setState({ gameStep:'q1', gamePath:[], gameResult:null }); };\n\n  gameTree() {\n    return {\n      q1:{q:'Твоя задача сейчас больше про неопределённость и хаос?',hint:'То есть непонятно, что делать, с чего начать или как собрать мысли.',yes:'q2',no:'q5'},\n      q2:{q:'Нужно придумать концепцию, формат или сильную идею?',hint:'Собрать из хаоса понятный образ, структуру или формат результата.',yes:'anna',no:'q3'},\n      q3:{q:'Нужно понять общую цель и разложить большую задачу на части?',hint:'Увидеть финальную цель и превратить её в посильные задачи.',yes:'yana',no:'q4'},\n      q4:{q:'Нужно собрать обсуждение команды в конкретный план действий?',hint:'Договориться, кто что делает, и не потерять темп.',yes:'liza',no:'anna+yana'},\n      q5:{q:'Есть риск, что задача сорвётся из-за сроков, ресурсов или слабых мест?',hint:'Ощущение, что можем не успеть или что-то пойдёт не так.',yes:'q6',no:'q8'},\n      q6:{q:'Нужно проверить риски, ограничения или подготовить план Б?',hint:'Понять слабые места решения и подстраховаться заранее.',yes:'alisa',no:'q7'},\n      q7:{q:'Нужно распределить ответственность и понять, кто что делает?',hint:'Назначить владельцев блоков и убрать «все за всё».',yes:'liza',no:'yana'},\n      q8:{q:'Нужно работать с данными, фактами, выводами или исследованием?',hint:'Разобраться в информации и сделать её понятной.',yes:'q9',no:'q11'},\n      q9:{q:'Нужно сделать выводы и рекомендации на основе данных?',hint:'Превратить данные в понятные решения и следующий шаг.',yes:'liza',no:'q10'},\n      q10:{q:'Нужно проверить реалистичность выводов и риски решения?',hint:'Понять, действительно ли это можно реализовать в срок.',yes:'alisa',no:'yana'},\n      q11:{q:'Нужно упаковать результат красиво и убедительно?',hint:'Собрать финальную подачу: презентацию, лендинг, документ.',yes:'anna',no:'q12'},\n      q12:{q:'Нужно улучшить командную работу, роли, дедлайны или обратную связь?',hint:'Настроить процесс и фокус, а не конкретный артефакт.',yes:'yana+liza',no:'chat'}\n    };\n  }\n  resInfo() {\n    return {\n      anna:{role:'Креатор',reason:'Анна подходит, если задача пока выглядит как хаос, но из неё нужно сделать понятную идею, структуру и финальную подачу.',tasks:['концепция','структура','презентация / лендинг / документ','финальная формулировка','упаковка решения']},\n      liza:{role:'Аналитик',reason:'Лиза подходит, если нужно организовать процесс, распределить задачи и не дать команде потеряться.',tasks:['план действий','распределение задач','поддержание темпа','фиксация договорённостей','координация']},\n      alisa:{role:'Риск-менеджер',reason:'Алиса подходит, если нужно проверить решение на риски, ограничения и реалистичность.',tasks:['риски','ограничения','план Б','критическая проверка','устойчивость решения']},\n      yana:{role:'Тимлид',reason:'Яна подходит, если нужно понять общую цель, разложить задачу на части и удержать фокус команды.',tasks:['цель','декомпозиция','фокус команды','обратная связь','ответственность и сроки']}\n    };\n  }\n\n  homeNav(id) {\n    if (this.state.page !== 'home') {\n      this.setState({ page: 'home', menuOpen: false });\n      setTimeout(() => this.scrollToId(id), 90);\n    } else {\n      this.setState({ menuOpen: false });\n      this.scrollToId(id);\n    }\n  }\n\n  runReset = () => {\n    if (this._resetTimer) clearInterval(this._resetTimer);\n    const steps = this.currentParticipant().resetProtocol.length;\n    let i = 0;\n    this.setState({ resetStep: 0 });\n    this._resetTimer = setInterval(() => {\n      i++;\n      if (i >= steps) { clearInterval(this._resetTimer); this._resetTimer = null; this.setState({ resetStep: steps }); return; }\n      this.setState({ resetStep: i });\n    }, 500);\n  };\n\n  data() {\n    return [\n      {\n        id:'anna', name:'Анна К.', role:'Креатор', workType:'PM / креатор / аналитик / упаковщик',\n        initial:'А',\n        homeBadges:['Креатор','Аналитик','Риск-менеджер'],\n        homeDesc:'Превращаю идеи в структуру, концепции и понятные решения.',\n        icon:'bulb',\n        quote:'Соединяю идеи, структуру, аналитику и визуальную подачу в один цельный результат.',\n        badges:['Креатив','Структура','PM-мышление','Аналитика','Финальная упаковка'],\n        overview:'Анна быстро включается в сложные и размытые задачи, когда нужно придумать концепцию, собрать структуру, связать разные идеи и упаковать результат так, чтобы он выглядел цельно, убедительно и современно. Её стиль — брать хаотичные вводные, вытаскивать из них суть, придумывать сильный формат и превращать всё это в понятный артефакт: документ, презентацию, лендинг или финальный концепт.',\n        quickSettings:[\n          {n:'01',title:'Лучше включается, когда',text:'есть сложная задача, дедлайн, свобода для концепции и понимание, какой результат нужно защитить.'},\n          {n:'02',title:'Комфортная коммуникация',text:'конкретные сообщения, понятные вводные, быстрые обсуждения по делу, фиксация решений.'},\n          {n:'03',title:'Лучший формат задач',text:'размытые задачи, где нужно придумать концепцию, структуру, презентацию или лендинг.'},\n          {n:'04',title:'Что помогает',text:'контекст, сильные референсы, критерии оценки и право собрать финальную структуру.'},\n          {n:'05',title:'Что мешает',text:'хаос без решений, отсутствие финального формата, бесконечные правки без приоритета.'}\n        ],\n        useCases:['нужно придумать креативную концепцию','задача выглядит слишком общей и мутной','нужно сделать структуру из разрозненных идей','нужно связать исследование с решением','нужно сделать презентацию, лендинг или документ','нужно красиво упаковать финальный результат','команда застряла в обсуждении и нужен фокус','нужно быстро поднять качество подачи'],\n        workStyle:[\n          {title:'Как начинает работу',points:['разбирает задание и критерии','выделяет обязательное','ищет сильную рамку','предлагает формат и визуальную логику']},\n          {title:'Как принимает решения',points:['через смысл и эффект','через соответствие заданию','через критерии оценки','через визуальную защиту результата']},\n          {title:'Как работает в команде',points:['предлагает формат','раскладывает задачу','собирает документ / презентацию / лендинг','проверяет соответствие критериям']}\n        ],\n        communication:{\n          works:['давать контекст и цель','сразу говорить формат результата','показывать референсы','фиксировать дедлайн','разделять обязательное и дополнительное','доверять финальную упаковку после согласования'],\n          notWorks:['«сделай красиво» без цели','«придумай что-нибудь» без вводных','менять концепцию в последний момент','давать много разрозненных правок','обсуждать бесконечно без финального выбора','ожидать, что она закроет весь проект одна']\n        },\n        blockers:[\n          {risk:'Размытая задача без критериев',manifestation:'можно потратить силы на лишнее',action:'зафиксировать требования, критерии и формат сдачи'},\n          {risk:'Слишком много идей без выбора',manifestation:'результат может расползтись',action:'договориться о критериях отбора'},\n          {risk:'Перегруз ответственностью',manifestation:'начинает закрывать всё сама',action:'распределить задачи и владельцев'},\n          {risk:'Правки без приоритета',manifestation:'непонятно, что критично',action:'делить правки на must-have и nice-to-have'}\n        ],\n        resetProtocol:['Вернуться к заданию и критериям','Определить, что точно должно быть в финале','Убрать лишние идеи в backlog','Назначить владельцев блоков','Дать собрать структуру без параллельного шума','Собирать правки в одном месте','Разрешить финальному сборщику принять последнее решение'],\n        superpower:{title:'Вижу, как из хаоса сделать продукт',text:'Идея, структура, визуальный стиль и финальная подача — в одном цельном решении.',helps:['появляется сильная концепция','задача быстрее превращается в структуру','финальный артефакт выглядит профессиональнее','идеи связываются с критериями оценки','команда получает оформленное решение']},\n        warningLabels:['не з
